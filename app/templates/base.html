<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}App{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block page_shell %}
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/"><span>> DEBATE_APP</a>
      <div class="navbar-nav ms-auto flex-row align-items-center gap-3">
        <a class="nav-link" href="/login">Login</a>
        <a class="profile-chip" href="/profile" aria-label="Open profile">
          <div class="profile-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12a3.5 3.5 0 1 0-3.5-3.5A3.5 3.5 0 0 0 12 12Z"></path>
              <path d="M5 20v-1a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v1"></path>
            </svg>
          </div>
          <div>
            <div class="profile-name">user_dev</div>
            <div class="profile-status">online</div>
          </div>
        </a>
      </div>
    </div>
  </nav>

  <main class="{% block main_class %}container py-4{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <span class="footer-prompt">$ echo "© 2026 DEBATE_APP // UWA CITS3403"</span>
      <span class="footer-tag">// v1.0</span>
    </div>
  </footer>
  {% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
