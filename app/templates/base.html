<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}App{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block page_shell %}
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/"><span>~/</span>app</a>
      <div class="navbar-nav ms-auto flex-row gap-3">
        <a class="nav-link" href="/login">Login</a>
        <div class="profile-nav-wrapper">
          <a class="nav-link" href="#" onclick="toggleProfileDropdown(); return false;">Profile</a>
          <div class="profile-dropdown" id="profileDropdown">
            <div class="profile-dropdown-top">
              <div class="profile-dropdown-avatar" id="modalAvatarDisplay">🤖</div>
              <div class="profile-dropdown-info">
                <div class="profile-dropdown-username">h4ck3rm1nd</div>
                <div class="profile-dropdown-email">user@debate.sh</div>
              </div>
            </div>
            <div class="profile-dropdown-actions">
              <button class="profile-action-btn" onclick="expandProfileModal()">edit profile</button>
              <button class="profile-action-btn profile-action-logout">logout</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="{% block main_class %}container py-4{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  {% endblock %}

  <!-- ── CREATE DEBATE MODAL ── -->
  <div class="modal-backdrop" id="createModalBackdrop" onclick="closeModal('createModal')"></div>
  <div class="app-modal" id="createModal">
    <div class="app-modal-card">
      <div class="app-modal-head">
        <span class="app-modal-title">create debate</span>
        <button class="app-modal-close" onclick="closeModal('createModal')">✕</button>
      </div>
      <div class="app-modal-body" id="createModalBody">
        <!-- content injected in later commits -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function openModal(id) {
      document.getElementById(id + 'Backdrop').classList.add('active');
      document.getElementById(id).classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(id) {
      document.getElementById(id + 'Backdrop').classList.remove('active');
      document.getElementById(id).classList.remove('active');
      document.body.style.overflow = '';
    }
    function toggleProfileDropdown() {
      document.getElementById('profileDropdown').classList.toggle('active');
    }
    function closeProfileDropdown() {
      document.getElementById('profileDropdown').classList.remove('active');
    }
    function expandProfileModal() {
      // wired up in commit 3
    }
    document.addEventListener('click', function(e) {
      const wrapper = document.querySelector('.profile-nav-wrapper');
      if (wrapper && !wrapper.contains(e.target)) closeProfileDropdown();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal('createModal');
        closeProfileDropdown();
      }
    });
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
