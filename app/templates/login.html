{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-page">

    <h1 class="mb-4 auth-heading"><span>~/</span>login<span class="terminal-cursor"></span></h1>

    <div class="auth-card">
      <form  id="loginForm" method="POST" action="/login">

        <div class ="auth-panel">
          <p class="auth-msg">$ login <span>--authenticate</span></p>

          <div class="mb-3">
            <label class="auth-label form-label" for="usernameEmail">Username or Email</label>
            <input type="text" class="form-control auth-input" id="usernameEmail" name="usernameEmail" autocomplete="username" required>
          </div>

          <div class="mb-4">
            <label class="auth-label form-label" for="password">Password</label>
            <input type="password" class="form-control auth-input" id="password" name="password" autocomplete="current-password" required>
          </div>

          <div class="mb-4 d-flex align-items-center gap-2"> 
            <input type="checkbox" class="auth-checkbox" id="remember" name="remember"> 
            <label class="auth-label form-label mb-0" for="remember">Remember me</label>
          </div>

          <button type="submit" class="auth-button">login --execute</button>
        </div>
      </form>
      <div class="auth-footer mt-4"> 
        <p>New user? <a href="/signup">Register</a></p> 
        <p>Forgot password? <a href="/reset">Reset</a></p> 
      </div>
    </div>  
</div>
{% endblock %}
