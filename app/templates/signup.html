{% extends "base.html" %}

{% block title %}Signup{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-page">

    <div class="auth-step-progress" id="signupProgress" role="progressbar" aria-label="Signup progress" aria-valuemin="1" aria-valuemax="2" aria-valuenow="1">
      <p class="auth-step-progress-text" id="signupProgressText">Step 1 of 2 - Account details</p>
    </div>

    <h1 class="mb-4 auth-heading"><span>~/</span>signup<span class="terminal-cursor"></span></h1>

    <div class="auth-card">
      <form id="signupForm" method="POST" action="/signup">
        <div class="auth-step-panels" id="signupPanels">
          <div class="auth-panel" data-step="1">
            <p class="auth-msg">$ signup <span>--verify-email</span></p>

            <div class="mb-3">
              <label class="auth-label form-label" for="email">Email</label>
              <input type="email" placeholder="example@gmail.com" class="form-control auth-input" id="email" name="email" required>
            </div>

            <div class="mb-3">
              <label class="auth-label form-label" for="password">Password</label>
              <input type="password" class="form-control auth-input" id="password" name="password" autocomplete="new-password" required>
            </div>

            <div class="mb-4">
              <label class="auth-label form-label" for="confirm_password">Confirm Password</label>
              <input type="password" class="form-control auth-input" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
            </div>

            <button type="button" class="auth-button" id="continueToProfile">continue --next</button>
          </div>

          <div class="auth-panel auth-step-panel" data-step="2">
            <p class="auth-msg">$ signup <span>--profile-setup</span></p>

            <div class="mb-3">
              <label class="auth-label form-label" for="username">Username</label>
              <input type="text" class="form-control auth-input" id="username" name="username" required>
            </div>

            <div class="mb-4">
              <label class="auth-label form-label mb-2">Interests (select all that apply)</label>

              <div class="auth-interest-buttons d-flex flex-wrap gap-2">
                <input type="checkbox" class="btn-check" id="interest1" name="interests[]" value="sports" autocomplete="off">
                <label class="btn btn-outline-secondary auth-interest-btn" for="interest1">Sports</label>

                <input type="checkbox" class="btn-check" id="interest2" name="interests[]" value="music" autocomplete="off">
                <label class="btn btn-outline-secondary auth-interest-btn" for="interest2">Music</label>

                <input type="checkbox" class="btn-check" id="interest3" name="interests[]" value="technology" autocomplete="off">
                <label class="btn btn-outline-secondary auth-interest-btn" for="interest3">Technology</label>

                <input type="checkbox" class="btn-check" id="interest4" name="interests[]" value="art" autocomplete="off">
                <label class="btn btn-outline-secondary auth-interest-btn" for="interest4">Art</label>

                <input type="checkbox" class="btn-check" id="interest5" name="interests[]" value="economics" autocomplete="off">
                <label class="btn btn-outline-secondary auth-interest-btn" for="interest5">Economics</label>
              </div>
            </div>

            <div class="auth-actions d-flex gap-2">
              <button type="button" class="auth-button auth-button-second" id="backToVerify">back --edit</button>
              <button type="submit" class="auth-button">signup --execute</button>
            </div>
          </div>
        </div>
      </form>

      <div class="auth-footer mt-3">
        <p>Already have an account? <a href="/login">Login</a></p>
      </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/signup.js') }}"></script>
{% endblock %}
